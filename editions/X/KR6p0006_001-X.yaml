body:
  text: 沙門知禮排定將釋經疏科二初題目二初正標疏題佛二能說人號天二釋文二初釋序三初敘經觀意二初正明觀行二初敘意二初對垢立淨二初法二初明二報苦樂夫二明二因心行誠二喻喻二就淨示脩故二示文二初示教興二初明興由然二明現土大二示觀相二初總標使二別示三初示依報觀四初示日觀落二示水觀大三示樹觀風四示池觀波二示正報觀二初明觀音勢至觀觀二明阿彌陀佛觀念三示三輩觀三初明上品上生及上品中生觀及二明上品下生文三總示三輩隨二結歎觀行可二敘經宗體此三敘經題目二初別題所二通題經二入文二入文二初取義釋題二初標列釋二隨釋五初釋名二初標第二釋二初對通略示二初就三處論通別三初約一化二初釋二初示諸題具通別一二明通別有三種三初教通別二初正明一化通二別指此經今二行通別為三理通別理二結此二約一題更三約一字二初就說字兼含釋更二就諸字互具釋佛二約一字以校量三初正校量於二引經證故三結今得若二就別廣明四初釋佛字二初正約佛名示六即二初翻名標示初二就覺廣明六初理即三初引諸經示即涅二就本覺明佛二初正示此二遮情雖三對四事辨理斯二名字即二初帶喻示名字二初不聞之失如二聞名之得若二引人明即佛故三觀行即二初觀妙色即真法三初約一佛二初示始習即心觀相觀二明覷成稱性周徧聞二等諸佛二初約一佛等諸佛念二明諸佛同三法一三念二身以結示念二明即佛常四相似即二初標釋二初約三身明即佛相二約四喻明相似相二勸證二初約事勸水二引文證略五分證即二初明初住二初約發心明即佛二初約三法明發今二約三身明佛三二約彼物明佛用二初總示三輪以二別示十界應二況後位初六究竟即二初據位直明究二約喻稱歎如二以例諸號明難說佛二釋說字三釋觀字四釋無量壽二辨體三明宗四論用五教相二隨經顯義二釋說字二初牒釋說二示相二初明所說法相即二明說能善巧二初於一法一門明四悉又二例諸法諸門示四悉若三釋觀空二初牒釋雙標觀二據教雙釋二初次第三觀二初列名指經從二釋相結果三初空觀今二假觀從三中觀二二一心三觀三初依智論釋二初釋相二初約法釋一二引類釋類二結果此二引中論證中三約妙結示此四釋無量壽二初牒名從梵無二從真出俗二初約本無三佛二隨世俱立二初列三身各三隨二釋三身三義二初約義分別三初法身二初別釋三初法身性二法壽法三法量此二總示此二報身二初稱法有報二初引經報二釋相如二於報立三三初明身法二明壽法三明量法三應身三初明應物有三初身應二壽應三量應二明依二有應三初法智二喻如三合功三明應徧三土二初雙明報應能二單示應身二初明有量二義有二結應佛皆然應二據理融即然二辨體三初牒起略示次二正釋主質四初據二文定體釋二為四章所歸無三約二喻顯尊譬四以一印結示故三具明體德三初約禮義明法身德書二約底義明般若德復三約達義明解脫德復三明宗二初標列次二隨釋二初簡示宗體二初簡二初簡宗體一二初牒言略斥有二據義廣破三初約義破何二立喻破如三舉過結宗二簡宗體異二初牒言破宗二舉過結宗二示與二就體明宗三初依經直示今二約土廣明三初列四土四二立淨穢各三釋名相四初釋同居娑二釋有餘三初約脩斷釋名方二據經論釋相釋三明利鈍淨穢就三釋實報三初約因果釋名實二依經論釋相仁三明漸頓淨穢就四釋寂光三初尅體立名常二約能居示相諸三明分滿淨穢分三據義結示故四論用二初標名略示次二約義廣釋二初約善惡具明滅二就滅惡偏釋二初無惡不除苦二從重別顯是五判教相二初正判所說教三初約五時判二初明教部教二明廣略赴二約二藏判二三約漸頓判漸二傍簡能說人顯二隨經顯義二初總別科判分二隨科解釋三初序分二初證信序二初標指六句初二隨文釋義六初標信如二異外道二初正釋我二料揀二初立難我二通難二初直通隨二舉譬如三辨息諍二初示論釋二初釋一一二釋時時二明今意今四明化主三初約異名釋佛二約三覺釋佛三約超因釋一五論住處二初釋住二初會在同住在二約論釋住二初標列住二解釋天二釋處二初略釋城山二初釋城二初翻梵王二解釋三初約諸王治化釋釋二約移居免火釋又三約畏罪得處釋又二釋山二初翻名耆二解釋三初約聖靈依鷲釋諸二約山形似鷲釋又三約鷲鳥捿隱釋又二總示法應然六列同聞二發起序二正宗分三流通分六列同聞眾二初標科辨次六二依次解釋二初聲聞眾二初分科略示聲二隨文解釋二初標位四初釋與與二釋大大三釋比丘二初標列六義比二隨要釋三初乞士釋二怖魔怖三破惡破四釋眾三初釋通名眾二釋別相一三明去取今二列數二初標人合數二初合一千三二合二百五十舍二常隨所以迦二菩薩眾二初科四文菩二釋二義二初釋位天二翻名文二發起序二初對辨不同二初泛舉差別二二正顯今經二初正顯今二釋疑何二總科略釋二初分科就二解釋三初問答釋疑二初問問二答答二預翻名字頻三隨科解經二初正明殺父二初分科初二隨釋四初頻婆為子幽禁二初隨釋經文二初師資現事二初釋時處標人初二明順友造逆五初釋惡友名族隨二釋惡友謀術二初從人學術為二誘人同謀心三明惡友言教語四明太子造逆隨五明惡友造逆調二父子前因頻二總結權化如二夫人奉食以濟王命國三聖為說法以潤王心二初釋目連授戒二初釋疾至目二釋戒相授二釋樓那說法富四法食延壽如二明欲害母二初分科次二隨釋四初為子幽閉三初欲害母分三初王問在不時二以事實答時三王聞嗔怒二初消經文名二釋妨難應二千臣諫不聽害三初釋勸辞劫二釋勸相以三明從勸驚三勅內官幽閉勸二因禁請佛二初分科二二隨釋二初明請人時二明請法作三因請往赴二初分科三二隨釋五初神通二初消文知二釋妨二初出妨問二正釋解二色身時三坐座坐四眷屬日五雨花普四傷歎請法二初分科四二隨釋二初明請其生處二初明供養問徃生因時二正問生處唯二明請徃生之因今二正宗分二初泛科懸解二初科三段第二解初文如二重科廣釋二初總別分科初二隨科解釋二初酬二問二初酬前生處二初答其生處三初放光普示爾二示土差別或三的求生處時二見土更請因唯二酬前淨業二初總別分科次二隨科解釋二初明三種淨業答思惟三初正明淨業三初光照頻婆得道二初釋微笑二初問阿二答二初答放光解二答微笑微二釋阿那含阿二舉果勸修因二初問去二答解三正示往生因二初正示二初共凡夫業第二共二乘業第三大乘不共業第二結歎佛二歎其所問妙契佛心佛三略付阿難今持獲利阿二明十六妙觀答正受二初分科時二隨釋二初明韋提見土之由佛二為未來請見土之法二初請時二答二初列觀分科二初列觀二二分科就二隨科解釋三初六觀觀依報六初日觀二初立意分科就二隨科解釋二初總勸修觀佛二正明日觀三初舉所觀境云二正教觀察二初除疑教二滅障障三結是二水觀二初分科第二隨釋三初舉所觀境次二正起觀行四初作水想見二變水成氷既三變氷為琉璃見四觀琉璃成地六初成地瑩徹此二寶幢光明下三地上莊嚴琉四寶光樓閣一五花幢樂器見六風樂演法八三結是三地觀二初分科第二隨釋四初漸想觀此二如實觀若三明利益佛四顯邪正作四樹觀二初分科第二隨釋三初結前生後佛二正明觀行五初明樹體觀二莊嚴相一三明生法諸四現佛國有五結觀觀三結是五池觀二初疏科第二釋經五初明池體次二明池相一三隨心適意其四明利益其五結觀是六總觀二初疏科第二經文四初明總觀二初觀寶樓二初正明觀樓眾二二處樂聲其二結成總觀此二結是三明利益若四顯邪正作二七觀觀正報三三觀明三輩二明利益二七觀觀正報二初分科次二隨釋四初勅聽許說佛二佛現身相說三為未來請時四酬請廣明二初別從酬請列五四二通就所觀釋七初第七華座觀二初疏科初二經文五初成座法用及辨相二初明法用佛二辨相四初花色數量令二華間珠光一三花臺寶網釋四寶幢莊嚴於二明隨機利物一三結觀是四明由願力所成佛五明觀未來利益若二第八佛像觀二初分科二二隨釋三初泛明諸佛法身自在從心想生三初釋初八句二初約感應道交釋二初明佛入生心法二明相隨物現即二約解入相應釋又二釋中二句二初作是別明二初約能感能成釋作是二約即應即果釋是是二作是共釋二初約始終釋始二約當現釋若三釋後二句正二偏觀彌陀并示觀法二初令偏觀是二示觀法四初觀佛像二初正明像觀想二因像見土見二觀二菩薩見三像放光二初明光照諸樹此二明樹皆三像一四行者聞法二初明因定聞此二明與經合行三明修觀利益作三第九佛身觀四第十觀音觀五第十一勢至觀六第十二普徃生觀七第十三雜明佛菩薩觀三第九佛身觀二初分科三二隨釋五初明結上佛二正觀佛身三初總標略列次二正觀佛身相四初觀色身阿二觀身量二初略消經文觀二商校分量二初以眼度身眼二定輕斥譯言三觀身光四初毛孔光身二觀圓光放三光中化佛於四化佛侍者一四觀相好二初正示相好身無二光明攝生一三明觀成能見四初見一佛其二見諸佛見三正觀佛心三初因身見心眼二正示心體佛三引文廣釋三初牒經引論以明文意三初眾生緣慈以二法緣慈二三無緣慈三二却牒前經以對初慈念三正以無緣會釋經意今四舉利勸修三初正舉益勸四初牒釋捨二喻顯如三結示以四引證故二的示觀法二初牒經從二正示四初引他文示二種毫量如二據此經明凡心難及故三正示初心從易理現正四剋示觀成稱彼而見二初正示若二引證智三就觀結成見五顯觀邪正四第十觀世音觀二初疏科略釋四二依科引經三初明結上佛二正觀菩薩身三初正觀身相十一初身量次二身色身三肉髻頂四項光項五身光舉六天冠頂七面光觀八毫相眉九臂相臂十手相手十一足相舉二與佛同異其三舉果勸脩二初舉觀利勸二初約脩觀明滅罪佛二約稱名況獲福如二示觀次第若三結觀邪正作五第十一勢至觀二初分科敘意二初分科五二敘意二初約當門明闕真觀畧二兼觀音明無像觀所二依科列經三初因光神力制二種名二初徧示諸光次二正立二名但二明與觀音同異三初正明同異此二更示行坐此三結成觀相作三滅罪以勸脩除六第十二普徃生觀二初疏科二初對雜辨異六二就普分科普二經文二初作自身往想見二明三聖來現無七第十三雜明佛菩薩觀二初分科七二隨釋二初觀丈六像佛二明彌陀變現二初示化主隨物二初勸常脩觀如二拂去眾疑二初示相問疑所二示疑明破前二明補處同生二初明劣應同眾生觀二倣勝身論觀法但三後三觀明三輩往生四初立觀所由三二會釋經論二初會論二初會二乘二初會不生釋二釋正果何二會女人問二會經二初對經雙問問二立義雙釋二初悔有輕重釋二行有定散二三依品定位二初通示九品二初示三中具九就二判九品屬三二初約位判上二以經驗何二別明上三二初約三位定上二約二義求一四隨文解釋四隨文解釋三初第十四上品生觀三初上品上生二初分科就二隨釋三初標佛二釋四初明生因若二明值緣生三明得生行四明後益生三結是二上品中生三初標上二釋四初明生因不二明值緣行三明得生行四明後益行三結是三上品下生三初標上二釋四初明生因亦二明值緣行三明得生見四明後益一三結是次第十五中品生觀三初中品上生三初標佛二釋四初明生因若二明值緣臨三明得生行四明後益二初正釋經文四二釋諸疑妨三初會小乘不生疑釋二釋中不及下妨中三通中不出家難大三結是二中品中生三初標中二釋四初明生因若二明值緣如三明得生行四明後益在三結是三中品下生三初標中二釋四初明生因若二明值緣此三明得生闡四明後益經三結是後第十六下品生觀三初下品上生三初標佛二釋四初因或二緣爾三生作四益經三結是次下品中生三初標佛二釋四初因或二緣吹三生如四益經三結是後下品下生三初標佛二釋四初因二初明念佛滅罪稱二引大論問答二初約少時責問二約猛心答是二緣命三生如四益於三結是二明利益二初疏科二二釋經二初明夫人道悟無生說二明侍女發心五三流通分二初總別分科第二隨科解釋二初明王宮流通四初列名教持二初阿難問二初問經名爾二問持說此二如來答二初答前問佛二答後問汝二舉益勸脩三初明生善滅惡二初直明生見佛善行二況顯滅生死罪善二明身勝友勝二初喻白蓮明身勝念二類補處明友勝觀三明得果起行當三結名付囑佛四眾聞歡喜佛二明崛山流通二初佛步空還爾二阿難重述爾雙徑山傳衣菴受菩薩戒弟子百松真覺重排於天台之仙泉禪院音釋閱音月匝峻上札下信埵音朵歍音烏音草隼音笋諐音愆慰音位妻之上音砌綺音起掣音离噉音淡肘音周上呼膝音息珂音科叵音頗縶音記與繫同熾音癡去呼甄音間𠒎音扶畟音即遑音黃逮音代
