body:
  text: 御製觀無量壽佛經序盖聞佛之道廣大無外光明畢照先天地而無始後天地而無終而其要以清淨為宗利濟為用其願力弘深拯拔無量盖極乎億萬劫之前極乎億萬劫之後同一慈悲之念平等之施故自西土以入中國千有體歲中國之人崇信其說遵奉其教盖大其能仁之功也夫人生於血氣之中長於聲利之途耳目口鼻四肢之欲不能無也纏緜於愛憎展轉於忮求馳騁一時之快而駸駸流墯於三塗之苦佛世尊之垂憫乎此也開方便之門啟懺悔之科咸使得以捨妄而歸真滅罪而資福凡一切之人果能體清淨心發真實願一念歸誠有感必應熏栴檀於穢域出蓮蕚於汙渠有不可名言之妙矣此觀無量壽佛經所以有益於世我皇考太宗體天弘道高明廣運聖武神功純仁至孝文皇帝皇妣仁孝慈懿誠明莊獻配天齊聖文皇后皆以上聖之資居至尊之位深仁大德涵育萬下至飛潛動植之類莫不熈自遂於泰和之世然二聖未嘗以是自足所以心佛之心廣佛之教嘉惠天下者至矣若觀無量壽佛經皇考嘗欲表章之未就而六御上賓宸遊在天哀慕無極用敢追成皇考聖志命工刊行此經而廣施之盖欲使天下後世至于無窮之人皆知歸誠佛道有過者圖改以自新好善者益勉而自進皆遊如來之境樂如來之福且以上資皇考皇妣在天之福於無窮焉謹序諸其簡端云洪熈元年正月初一日重刻觀經疏鈔序佛說念佛門開觀想一法所以純熟其淨念也念佛而神棲安養得此依正莊嚴了然在目令觀想者助以持名持名者資以觀想而淨土法門圓歸實相矣初心士淨念難純苟熟其安養依正念舉即現前而欲淨念相繼不難也經有疏鈔則讀者易明而天台四明釋此最精妙俾知用一心空假中之三觀圓照真俗中之三諦而深證乎寂光淨土之法身般若解脫三德嗚呼大矣哉是書板遐邇無聞流通甚少乙酉秋會王君愚庵貝君簡香讚歎重刊之余於是勸眾力閱半稔而成乃大福德因緣也當知是書與彌陀疏鈔並峙一闡持名一闡觀想以極其淨業之大成不可忽不可忽道光五年佛成道日吳僧悟開謹譔
